<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYVERSE Running Crew</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=Share+Tech+Mono&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:#06080f;color:#e8f4fd;font-family:'Noto Sans KR',sans-serif;overflow-x:hidden}

  .bg{position:fixed;inset:0;z-index:0;
    background:radial-gradient(ellipse at 15% 20%,rgba(13,71,161,.4) 0%,transparent 50%),
               radial-gradient(ellipse at 85% 80%,rgba(21,101,192,.22) 0%,transparent 50%),#06080f}
  .grid{position:fixed;inset:0;z-index:0;
    background-image:linear-gradient(rgba(66,165,245,.04) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(66,165,245,.04) 1px,transparent 1px);
    background-size:44px 44px}
  .glow{position:fixed;top:-15%;left:50%;transform:translateX(-50%);
    width:500px;height:260px;z-index:0;pointer-events:none;
    background:radial-gradient(ellipse,rgba(33,150,243,.12) 0%,transparent 70%);
    animation:gp 4s ease-in-out infinite}
  @keyframes gp{0%,100%{opacity:.5}50%{opacity:1}}
  .butterfly-bg{position:fixed;right:-40px;top:36%;z-index:0;pointer-events:none;
    opacity:.05;animation:fbf 10s ease-in-out infinite}
  @keyframes fbf{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-28px) rotate(4deg)}}

  .wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 16px 110px}

  /* Header */
  .hdr{text-align:center;padding:36px 0 26px}
  .logo-wrap{position:relative;width:92px;margin:0 auto 16px;cursor:pointer}
  .ring{width:92px;height:92px;border-radius:50%;background:rgba(255,255,255,.03);
    border:2px solid rgba(66,165,245,.3);display:flex;align-items:center;justify-content:center;
    overflow:hidden;box-shadow:0 0 40px rgba(33,150,243,.2);animation:rp 3s ease-in-out infinite}
  @keyframes rp{0%,100%{box-shadow:0 0 40px rgba(33,150,243,.2)}50%{box-shadow:0 0 60px rgba(33,150,243,.42)}}
  .ring img{width:100%;height:100%;object-fit:cover}
  .edit-badge{position:absolute;bottom:0;right:0;width:26px;height:26px;border-radius:50%;
    background:linear-gradient(135deg,#1565c0,#42a5f5);border:2px solid #06080f;
    display:flex;align-items:center;justify-content:center;font-size:12px}
  .crew-name{font-family:'Share Tech Mono',monospace;font-size:38px;letter-spacing:9px;
    color:#e8f4fd;text-shadow:0 0 28px rgba(100,181,246,.5);line-height:1}
  .crew-sub{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:4px;
    color:rgba(100,181,246,.48);margin-top:7px;text-transform:uppercase}

  /* Stats */
  .stats{display:flex;gap:10px;margin:22px 0 24px}
  .stile{flex:1;background:rgba(255,255,255,.03);border:1px solid rgba(66,165,245,.13);
    border-radius:14px;padding:16px 10px;text-align:center;position:relative;overflow:hidden}
  .stile::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,rgba(66,165,245,.42),transparent)}
  .sval{font-family:'Share Tech Mono',monospace;font-size:28px;color:#64b5f6;line-height:1}
  .slbl{font-size:10px;color:rgba(232,244,253,.3);margin-top:5px;letter-spacing:1.5px;font-weight:700}

  /* Tabs */
  .tabs{display:flex;background:rgba(255,255,255,.03);border:1px solid rgba(66,165,245,.1);
    border-radius:12px;padding:4px;margin-bottom:20px}
  .tbtn{flex:1;padding:10px 4px;border:none;background:transparent;color:rgba(232,244,253,.3);
    font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;
    border-radius:9px;transition:all .22s}
  .tbtn.on{background:linear-gradient(135deg,#1565c0,#1976d2);color:#e8f4fd;
    box-shadow:0 4px 18px rgba(21,101,192,.45)}

  /* Sort */
  .chips{display:flex;gap:8px;margin-bottom:18px}
  .chip{padding:7px 16px;border-radius:20px;border:1px solid rgba(66,165,245,.18);
    background:transparent;color:rgba(232,244,253,.38);font-family:'Noto Sans KR',sans-serif;
    font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
  .chip.on{background:rgba(21,101,192,.28);border-color:#42a5f5;color:#90caf9}

  /* Card */
  .card{background:rgba(255,255,255,.025);border:1px solid rgba(66,165,245,.09);
    border-radius:16px;padding:16px;margin-bottom:10px;display:flex;align-items:center;
    gap:12px;transition:all .22s;position:relative;overflow:hidden}
  .card:hover{border-color:rgba(66,165,245,.28);transform:translateY(-2px);background:rgba(255,255,255,.04)}
  .card.top{border-color:rgba(100,181,246,.38);background:rgba(21,101,192,.08)}
  .rtag{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;min-width:34px;text-align:center;letter-spacing:1px}
  .avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:17px;font-weight:900;color:#fff;flex-shrink:0;border:2px solid rgba(100,181,246,.25)}
  .minfo{flex:1;min-width:0}
  .mname{font-size:16px;font-weight:900;color:#e8f4fd;letter-spacing:.5px}
  .mmeta{font-size:11px;color:rgba(232,244,253,.35);margin-top:3px}
  .spill{display:inline-flex;align-items:center;gap:3px;background:rgba(255,87,34,.13);
    border:1px solid rgba(255,87,34,.28);border-radius:6px;padding:2px 8px;font-size:10px;
    color:#ff8a65;font-weight:700;margin-top:5px}
  .pcnt{display:inline-flex;align-items:center;gap:3px;background:rgba(255,167,38,.1);
    border:1px solid rgba(255,167,38,.25);border-radius:6px;padding:2px 8px;font-size:10px;
    color:#ffa726;font-weight:700;margin-top:5px;margin-left:5px}
  .pbar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:8px;overflow:hidden}
  .pfill{height:100%;background:linear-gradient(90deg,#1565c0,#42a5f5,#90caf9);border-radius:2px;transition:width .6s}
  .mkm{text-align:right;flex-shrink:0}
  .kbig{font-family:'Share Tech Mono',monospace;font-size:24px;color:#64b5f6;line-height:1}
  .ksm{font-size:10px;color:rgba(232,244,253,.3);font-weight:700;margin-top:2px}
  .card-actions{display:flex;gap:6px;margin-top:8px}
  .act-btn{padding:5px 12px;border-radius:8px;border:1px solid rgba(66,165,245,.2);
    background:transparent;color:rgba(100,181,246,.7);font-family:'Noto Sans KR',sans-serif;
    font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
  .act-btn:hover{background:rgba(21,101,192,.25);border-color:#42a5f5;color:#90caf9}
  .act-btn.ph{border-color:rgba(255,167,38,.3);color:rgba(255,167,38,.7)}
  .act-btn.ph:hover{background:rgba(255,167,38,.12);border-color:#ffa726;color:#ffb74d}

  /* Attendance dots */
  .dots{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap}
  .dot{width:7px;height:7px;border-radius:50%;background:rgba(232,244,253,.09)}
  .dot.on{background:#42a5f5;box-shadow:0 0 5px rgba(66,165,245,.55)}

  /* Photos grid */
  .photo-section{margin-bottom:20px}
  .photo-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .photo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
  .photo-thumb{border-radius:10px;overflow:hidden;border:1px solid rgba(66,165,245,.15);position:relative;cursor:pointer}
  .photo-thumb img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
  .photo-date{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(6,8,15,.8));
    padding:12px 6px 5px;font-size:9px;color:rgba(232,244,253,.7);font-family:'Share Tech Mono',monospace}
  .no-photo{border:1px dashed rgba(66,165,245,.12);border-radius:12px;padding:20px;
    text-align:center;color:rgba(232,244,253,.2);font-size:12px}

  /* FAB */
  .fab-wrap{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10}
  .fab{background:linear-gradient(135deg,#1565c0,#1976d2);color:#e8f4fd;border:none;
    border-radius:50px;padding:15px 28px;font-family:'Noto Sans KR',sans-serif;font-size:14px;
    font-weight:800;cursor:pointer;box-shadow:0 8px 32px rgba(21,101,192,.5);transition:all .2s;
    letter-spacing:1px;white-space:nowrap}
  .fab:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(21,101,192,.65)}

  /* Modal */
  .ov{position:fixed;inset:0;background:rgba(6,8,15,.85);backdrop-filter:blur(12px);
    z-index:20;display:flex;align-items:flex-end;justify-content:center;display:none}
  .ov.show{display:flex}
  .modal{background:#0c1018;border:1px solid rgba(66,165,245,.22);border-radius:24px 24px 0 0;
    padding:28px 24px 50px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
  .mhandle{width:40px;height:4px;background:rgba(255,255,255,.09);border-radius:2px;margin:0 auto 22px}
  .mttl{font-size:18px;font-weight:900;color:#64b5f6;margin-bottom:20px;letter-spacing:.5px}
  .minput{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(66,165,245,.18);
    border-radius:12px;padding:15px 16px;color:#e8f4fd;font-family:'Noto Sans KR',sans-serif;
    font-size:15px;margin-bottom:12px;outline:none;transition:border-color .2s}
  .minput:focus{border-color:#42a5f5}
  .minput::placeholder{color:rgba(232,244,253,.22)}
  .mbtn{width:100%;padding:16px;background:linear-gradient(135deg,#1565c0,#1976d2);color:#e8f4fd;
    border:none;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:15px;
    font-weight:800;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 20px rgba(21,101,192,.4);transition:all .2s}
  .mbtn.ora{background:linear-gradient(135deg,#e65100,#f57c00);box-shadow:0 4px 20px rgba(230,81,0,.35)}
  .mbtn:disabled{opacity:.35;cursor:not-allowed}
  .mcancel{width:100%;padding:13px;background:transparent;color:rgba(232,244,253,.28);border:none;
    font-family:'Noto Sans KR',sans-serif;font-size:14px;cursor:pointer;margin-top:8px}
  .upload-area{width:100%;aspect-ratio:16/9;border:2px dashed rgba(255,167,38,.3);border-radius:14px;
    margin-bottom:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;transition:all .2s;overflow:hidden;position:relative;background:rgba(255,255,255,.02)}
  .upload-area:hover{border-color:#ffa726}
  .upload-area img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
  .upload-placeholder{text-align:center;z-index:1}
  .upload-icon{font-size:36px;margin-bottom:8px}
  .upload-text{font-size:13px;color:rgba(232,244,253,.4);font-weight:600}

  /* Gallery */
  .gallery-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
  .gallery-item{border-radius:12px;overflow:hidden;background:rgba(255,255,255,.04);border:1px solid rgba(66,165,245,.12)}
  .gallery-item img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
  .gallery-meta{padding:8px 10px}
  .gallery-date{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(100,181,246,.6)}
  .gallery-note{font-size:11px;color:rgba(232,244,253,.6);margin-top:3px;line-height:1.4}

  /* Loading / Toast */
  .loading{text-align:center;padding:40px;color:rgba(232,244,253,.4);font-family:'Share Tech Mono',monospace}
  .toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);
    background:rgba(21,101,192,.93);color:#e8f4fd;border:1px solid rgba(66,165,245,.35);
    padding:12px 26px;border-radius:50px;font-size:14px;font-weight:700;z-index:99;
    white-space:nowrap;backdrop-filter:blur(10px);opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}

  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(66,165,245,.2);border-radius:2px}
</style>
</head>
<body>

<div class="bg"></div>
<div class="grid"></div>
<div class="glow"></div>
<div class="butterfly-bg">
  <img id="bgButterfly" src="" style="width:200px" alt="">
</div>

<div class="wrap">
  <div class="hdr">
    <div class="logo-wrap" onclick="document.getElementById('logoInput').click()">
      <div class="ring"><img id="logoImg" src="" alt="HYVERSE"></div>
      <div class="edit-badge">✏️</div>
      <input type="file" id="logoInput" accept="image/*" style="display:none">
    </div>
    <div class="crew-name">HYVERSE</div>
    <div class="crew-sub">Running Crew</div>
  </div>

  <div class="stats">
    <div class="stile"><div class="sval" id="statMembers">-</div><div class="slbl">MEMBERS</div></div>
    <div class="stile"><div class="sval" id="statKm">-</div><div class="slbl">TOTAL KM</div></div>
    <div class="stile"><div class="sval" id="statSessions">-</div><div class="slbl">SESSIONS</div></div>
  </div>

  <div class="tabs">
    <button class="tbtn on" onclick="switchTab('leaderboard',this)">🏆 리더보드</button>
    <button class="tbtn" onclick="switchTab('attendance',this)">📋 출석</button>
    <button class="tbtn" onclick="switchTab('photos',this)">📸 인증샷</button>
  </div>

  <div id="tab-leaderboard">
    <div class="chips">
      <button class="chip on" onclick="setSort('totalKm',this)">총 거리</button>
      <button class="chip" onclick="setSort('sessions',this)">출석</button>
      <button class="chip" onclick="setSort('streak',this)">연속</button>
    </div>
    <div id="leaderboard-list"><div class="loading">🦋 데이터 불러오는 중...</div></div>
  </div>

  <div id="tab-attendance" style="display:none">
    <div id="attendance-list"><div class="loading">🦋 데이터 불러오는 중...</div></div>
  </div>

  <div id="tab-photos" style="display:none">
    <div id="photos-list"><div class="loading">🦋 데이터 불러오는 중...</div></div>
  </div>
</div>

<div class="fab-wrap">
  <button class="fab" onclick="openAddMember()">🦋 멤버 추가</button>
</div>

<!-- 멤버 추가 모달 -->
<div class="ov" id="modal-add" onclick="closeModal('modal-add')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mhandle"></div>
    <div class="mttl">🦋 새 멤버 합류</div>
    <input class="minput" id="input-newname" placeholder="이름 입력" onkeydown="if(event.key==='Enter')addMember()">
    <button class="mbtn" onclick="addMember()">HYVERSE 합류하기</button>
    <button class="mcancel" onclick="closeModal('modal-add')">취소</button>
  </div>
</div>

<!-- 러닝 기록 모달 -->
<div class="ov" id="modal-run" onclick="closeModal('modal-run')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mhandle"></div>
    <div class="mttl" id="run-modal-title">러닝 기록</div>
    <input class="minput" id="input-km" type="number" placeholder="거리 (km) · 예: 5.5">
    <input class="minput" id="input-pace" placeholder="페이스 (선택) · 예: 5:30">
    <button class="mbtn" onclick="logRun()">기록 저장 💨</button>
    <button class="mcancel" onclick="closeModal('modal-run')">취소</button>
  </div>
</div>

<!-- 인증샷 모달 -->
<div class="ov" id="modal-photo" onclick="closeModal('modal-photo')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mhandle"></div>
    <div class="mttl" id="photo-modal-title">📸 인증샷 등록</div>
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('photoInput').click()">
      <div class="upload-placeholder" id="uploadPlaceholder">
        <div class="upload-icon">📷</div>
        <div class="upload-text">사진을 선택하세요</div>
      </div>
    </div>
    <input type="file" id="photoInput" accept="image/*" style="display:none">
    <input class="minput" id="input-note" placeholder="한 마디 남기기 (선택) · 예: 오늘 10km 완주!">
    <button class="mbtn ora" id="submitPhotoBtn" onclick="submitPhoto()" disabled>인증샷 등록 📸</button>
    <button class="mcancel" onclick="closeModal('modal-photo')">취소</button>
  </div>
</div>

<!-- 갤러리 모달 -->
<div class="ov" id="modal-gallery" onclick="closeModal('modal-gallery')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mhandle"></div>
    <div class="mttl" id="gallery-title">인증샷</div>
    <div class="gallery-grid" id="gallery-grid"></div>
    <button class="mcancel" onclick="closeModal('modal-gallery')">닫기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">

import { getDatabase, ref, onValue, set, push, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBpp746-fwscMY5N5Ixlz-ya2U9ffHiG08",
  authDomain: "hyverse-ab902.firebaseapp.com",
  databaseURL: "https://hyverse-ab902-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hyverse-ab902",
  storageBucket: "hyverse-ab902.firebasestorage.app",
  messagingSenderId: "149264408802",
  appId: "1:149264408802:web:c2d386a1cea574dfd03ebb"
};

const app = initializeApp(firebaseConfig);

const RANK_COLORS = ["#64b5f6","#90caf9","#b3e5fc","rgba(232,244,253,0.25)"];
const RANK_LABELS = ["1ST","2ND","3RD","4TH"];
const AV_COLORS = [["#1565c0","#42a5f5"],["#0d47a1","#64b5f6"],["#1976d2","#90caf9"],["#283593","#7986cb"]];

let members = {};
let sortBy = "totalKm";
let activeTab = "leaderboard";
let currentMemberId = null;
let photoDataUrl = null;

// 로고 초기화
document.getElementById("logoImg").src = DEFAULT_LOGO;
document.getElementById("bgButterfly").src = DEFAULT_LOGO;

// Firebase 실시간 동기화
onValue(ref(db, "members"), (snapshot) => {
  members = snapshot.val() || {};

  // 멤버가 없으면 기본 멤버 추가
  if (Object.keys(members).length === 0) {
    const defaults = ["고기욱","김미정","김광섭","김만재"];
    defaults.forEach(name => {
      const newRef = push(ref(db, "members"));
      set(newRef, { name, sessions:0, totalKm:0, avgPace:"-", streak:0, photos:{} });
    });
    return;
  }
  updateStats();
  renderAll();
});

// 로고 변경
onValue(ref(db, "logo"), (snapshot) => {
  const logo = snapshot.val();
  if (logo) {
    document.getElementById("logoImg").src = logo;
    document.getElementById("bgButterfly").src = logo;
  }
});

document.getElementById("logoInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    set(ref(db, "logo"), ev.target.result);
    showToast("로고 변경 완료! 🦋");
  };
  reader.readAsDataURL(file);
});

function updateStats() {
  const arr = Object.values(members);
  const totalKm = arr.reduce((s,m) => s + (m.totalKm||0), 0).toFixed(1);
  const totalSessions = arr.reduce((s,m) => s + (m.sessions||0), 0);
  document.getElementById("statMembers").textContent = arr.length;
  document.getElementById("statKm").textContent = totalKm;
  document.getElementById("statSessions").textContent = totalSessions;
}

function getAvatar(name, size=44) {
  const [bg,fg] = AV_COLORS[name.charCodeAt(0) % AV_COLORS.length];
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:linear-gradient(135deg,${bg},${fg});font-size:${size*.38}px">${name[0]}</div>`;
}

function renderAll() {
  renderLeaderboard();
  renderAttendance();
  renderPhotos();
}

function renderLeaderboard() {
  const arr = Object.entries(members).map(([id,m]) => ({id,...m}));
  arr.sort((a,b) => (b[sortBy]||0) - (a[sortBy]||0));
  const maxKm = Math.max(...arr.map(m=>m.totalKm||0), 1);

  document.getElementById("leaderboard-list").innerHTML = arr.map((m,i) => `
    <div class="card ${i===0?'top':''}">
      <div class="rtag" style="color:${RANK_COLORS[i]||'rgba(232,244,253,0.2)'}">${RANK_LABELS[i]||i+1}</div>
      ${getAvatar(m.name)}
      <div class="minfo">
        <div class="mname">${m.name}</div>
        <div class="mmeta">페이스 ${m.avgPace||'-'} · ${m.sessions||0}회 출석</div>
        <div>
          ${(m.streak||0)>0?`<span class="spill">🔥 ${m.streak}연속</span>`:''}
          ${Object.keys(m.photos||{}).length>0?`<span class="pcnt">📸 ${Object.keys(m.photos).length}</span>`:''}
        </div>
        <div class="pbar"><div class="pfill" style="width:${Math.min(100,((m.totalKm||0)/maxKm)*100)}%"></div></div>
        <div class="card-actions">
          <button class="act-btn" onclick="openRunLog('${m.id}','${m.name}')">🏃 기록 추가</button>
          <button class="act-btn ph" onclick="openPhotoLog('${m.id}','${m.name}')">📸 인증샷</button>
        </div>
      </div>
      <div class="mkm">
        <div class="kbig">${m.totalKm||0}</div>
        <div class="ksm">KM</div>
      </div>
    </div>
  `).join('');
}

function renderAttendance() {
  const arr = Object.entries(members).map(([id,m]) => ({id,...m}));
  document.getElementById("attendance-list").innerHTML = arr.map(m => {
    const sessions = m.sessions||0;
    const dots = Array.from({length:Math.max(sessions,8)},(_,i) =>
      `<div class="dot ${i<sessions?'on':''}"></div>`).join('');
    return `
      <div class="card">
        ${getAvatar(m.name)}
        <div class="minfo">
          <div class="mname">${m.name}</div>
          <div class="dots">${dots}<span style="font-size:11px;color:rgba(232,244,253,.35);margin-left:4px;font-weight:600">${sessions}회</span></div>
          <div class="card-actions" style="margin-top:10px">
            <button class="act-btn" onclick="openRunLog('${m.id}','${m.name}')">🏃 기록 추가</button>
            <button class="act-btn ph" onclick="openPhotoLog('${m.id}','${m.name}')">📸 인증샷</button>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-family:'Share Tech Mono',monospace;font-size:18px;color:${(m.streak||0)>0?'#ff8a65':'rgba(232,244,253,.15)'}">${(m.streak||0)>0?`🔥${m.streak}`:'—'}</div>
          <div style="font-size:10px;color:rgba(232,244,253,.28);font-weight:700">STREAK</div>
        </div>
      </div>`;
  }).join('');
}

function renderPhotos() {
  const arr = Object.entries(members).map(([id,m]) => ({id,...m}));
  document.getElementById("photos-list").innerHTML = arr.map(m => {
    const photos = Object.entries(m.photos||{}).map(([pid,p]) => ({pid,...p}));
    const grid = photos.length === 0
      ? `<div class="no-photo">아직 인증샷이 없어요 📸</div>`
      : `<div class="photo-grid">${photos.map(p=>`
          <div class="photo-thumb" onclick="openGallery('${m.id}','${m.name}')">
            <img src="${p.src}" alt="${p.note||''}">
            <div class="photo-date">${p.date||''}</div>
          </div>`).join('')}</div>`;
    return `
      <div class="photo-section">
        <div class="photo-header">
          ${getAvatar(m.name,36)}
          <div><div style="font-weight:900;font-size:15px">${m.name}</div>
          <div style="font-size:11px;color:rgba(232,244,253,.35)">인증샷 ${photos.length}장</div></div>
          <button class="act-btn ph" style="margin-left:auto" onclick="openPhotoLog('${m.id}','${m.name}')">+ 추가</button>
        </div>
        ${grid}
      </div>`;
  }).join('');
}

// Tab switching
window.switchTab = (tab, btn) => {
  activeTab = tab;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  ['leaderboard','attendance','photos'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t===tab?'block':'none';
  });
};

window.setSort = (key, btn) => {
  sortBy = key;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  renderLeaderboard();
};

// Modals
window.openAddMember = () => {
  document.getElementById('input-newname').value = '';
  document.getElementById('modal-add').classList.add('show');
  setTimeout(()=>document.getElementById('input-newname').focus(), 100);
};

window.openRunLog = (id, name) => {
  currentMemberId = id;
  document.getElementById('run-modal-title').textContent = `${name} · 러닝 기록`;
  document.getElementById('input-km').value = '';
  document.getElementById('input-pace').value = '';
  document.getElementById('modal-run').classList.add('show');
  setTimeout(()=>document.getElementById('input-km').focus(), 100);
};

window.openPhotoLog = (id, name) => {
  currentMemberId = id;
  photoDataUrl = null;
  document.getElementById('photo-modal-title').textContent = `📸 ${name} · 인증샷 등록`;
  document.getElementById('input-note').value = '';
  document.getElementById('submitPhotoBtn').disabled = true;
  const area = document.getElementById('uploadArea');
  const existing = area.querySelector('img.preview');
  if (existing) existing.remove();
  document.getElementById('uploadPlaceholder').style.display = 'block';
  document.getElementById('modal-photo').classList.add('show');
};

window.openGallery = (id, name) => {
  const m = members[id];
  if (!m) return;
  const photos = Object.entries(m.photos||{}).map(([pid,p])=>({pid,...p}));
  document.getElementById('gallery-title').textContent = `${name}의 인증샷 (${photos.length})`;
  document.getElementById('gallery-grid').innerHTML = photos.map(p=>`
    <div class="gallery-item">
      <img src="${p.src}" alt="${p.note||''}">
      <div class="gallery-meta">
        <div class="gallery-date">${p.date||''}</div>
        ${p.note?`<div class="gallery-note">${p.note}</div>`:''}
      </div>
    </div>`).join('');
  document.getElementById('modal-gallery').classList.add('show');
};

window.closeModal = (id) => document.getElementById(id).classList.remove('show');

// Actions
window.addMember = () => {
  const name = document.getElementById('input-newname').value.trim();
  if (!name) return;
  const newRef = push(ref(db, "members"));
  set(newRef, { name, sessions:0, totalKm:0, avgPace:"-", streak:0, photos:{} });
  closeModal('modal-add');
  showToast('새 멤버 합류! 🦋');
};

window.logRun = () => {
  const km = parseFloat(document.getElementById('input-km').value);
  if (!km || km <= 0) return;
  const pace = document.getElementById('input-pace').value.trim();
  const m = members[currentMemberId];
  if (!m) return;
  update(ref(db, `members/${currentMemberId}`), {
    sessions: (m.sessions||0) + 1,
    totalKm: parseFloat(((m.totalKm||0) + km).toFixed(1)),
    avgPace: pace || m.avgPace || '-',
    streak: (m.streak||0) + 1,
  });
  closeModal('modal-run');
  showToast('기록 완료! 💨');
};

// Photo upload
document.getElementById('photoInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    photoDataUrl = ev.target.result;
    const area = document.getElementById('uploadArea');
    const existing = area.querySelector('img.preview');
    if (existing) existing.remove();
    const img = document.createElement('img');
    img.src = photoDataUrl;
    img.className = 'preview';
    area.appendChild(img);
    document.getElementById('uploadPlaceholder').style.display = 'none';
    document.getElementById('submitPhotoBtn').disabled = false;
  };
  reader.readAsDataURL(file);
});

document.getElementById('uploadArea').addEventListener('click', () => {
  document.getElementById('photoInput').click();
});

window.submitPhoto = () => {
  if (!photoDataUrl) return;
  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  const note = document.getElementById('input-note').value.trim();
  const photoRef = push(ref(db, `members/${currentMemberId}/photos`));
  set(photoRef, { src: photoDataUrl, note, date: dateStr });
  closeModal('modal-photo');
  showToast('인증샷 등록 완료! 📸');
};

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// 키보드 Enter
document.getElementById('input-newname').addEventListener('keydown', e => { if(e.key==='Enter') window.addMember(); });
document.getElementById('input-km').addEventListener('keydown', e => { if(e.key==='Enter') window.logRun(); });

</script>
</body>
</html>
